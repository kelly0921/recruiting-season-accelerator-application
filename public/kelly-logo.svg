<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-labelledby="title desc">
  <title id="title">Kelly Chen monogram</title>
  <desc id="desc">A cream KC monogram badge with rose accent.</desc>
  <rect width="96" height="96" rx="30" fill="#fff8ef"/>
  <rect x="10.5" y="10.5" width="75" height="75" rx="25" fill="none" stroke="#c8b9a5" stroke-width="1.25" opacity=".72"/>
  <text x="20" y="65" fill="#303847" font-family="Didot, Bodoni 72, Georgia, 'Times New Roman', serif" font-size="56" font-weight="500" letter-spacing="-7">K</text>
  <text x="42" y="66" fill="#d9829b" font-family="Didot, Bodoni 72, Georgia, 'Times New Roman', serif" font-size="56" font-weight="500" letter-spacing="-7">C</text>
